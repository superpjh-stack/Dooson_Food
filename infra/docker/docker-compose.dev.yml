services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: dooson_mes
      POSTGRES_USER: mes_user
      POSTGRES_PASSWORD: mes_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes_user -d dooson_mes"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9883:9883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: dooson_mes
      DB_USER: mes_user
      DB_PASSWORD: mes_pass
      REDIS_URL: redis://redis:6379
      IOT_MQTT_HOST: mosquitto
      DEBUG: "true"
    volumes:
      - ../../services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  miniodata:
